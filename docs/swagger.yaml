basePath: /api/v1
definitions:
  internal_adapters_handlers_http.createIngredientReq:
    properties:
      name:
        type: string
      price:
        type: number
    type: object
  internal_adapters_handlers_http.createOrderReq:
    properties:
      items:
        items:
          $ref: '#/definitions/restaurant-api_internal_core_ports.OrderItemInput'
        type: array
      user_id:
        type: string
    type: object
  internal_adapters_handlers_http.createProductReq:
    properties:
      description:
        type: string
      image:
        type: string
      ingredients:
        items:
          type: string
        type: array
      name:
        type: string
      price:
        type: number
    type: object
  internal_adapters_handlers_http.createUserReq:
    properties:
      email:
        type: string
      name:
        type: string
      phone_number:
        type: string
    type: object
  restaurant-api_internal_core_domain.Ingredient:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: number
      updated_at:
        type: string
    type: object
  restaurant-api_internal_core_domain.Order:
    properties:
      created_at:
        type: string
      id:
        type: string
      items:
        description: Stored separately in MongoDB, populated in memory
        items:
          $ref: '#/definitions/restaurant-api_internal_core_domain.OrderProduct'
        type: array
      phone_number:
        description: Stored alongside user_id as per diagram
        type: string
      total_price:
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  restaurant-api_internal_core_domain.OrderProduct:
    properties:
      adicionais:
        description: array of extra ingredient IDs
        items:
          type: string
        type: array
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      ingredients:
        description: array of ingredient IDs included
        items:
          type: string
        type: array
      name:
        type: string
      order_id:
        type: string
      price:
        description: calculated price (base product + adicionais)
        type: number
      product_id:
        type: string
      removed:
        description: array of removed ingredient IDs
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  restaurant-api_internal_core_domain.Product:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      image:
        type: string
      ingredients:
        description: array of ingredient IDs
        items:
          type: string
        type: array
      name:
        type: string
      price:
        type: number
      updated_at:
        type: string
    type: object
  restaurant-api_internal_core_domain.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone_number:
        type: string
      updated_at:
        type: string
    type: object
  restaurant-api_internal_core_ports.OrderItemInput:
    properties:
      adicionais:
        items:
          type: string
        type: array
      product_id:
        type: string
      removed:
        items:
          type: string
        type: array
    type: object
host: localhost:7000
